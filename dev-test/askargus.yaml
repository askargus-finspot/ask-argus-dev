# AskArgus UI Configuration with Grok, OpenRouter, and Local LLM Support
# Version: 1.3.7

version: 1.3.7

# Cache settings
cache: true

# Custom interface configuration
interface:
  # Enable/disable various UI features
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  multiConvo: true
  
  # Prompts configuration
  prompts:
    use: true
    create: true
    share: false
    public: false
  
  # Agents configuration
  agents:
    use: true
    create: true
    share: false
    public: false
  
  # People picker configuration
  peoplePicker:
    users: true
    groups: true
    roles: true
  
  # File search and citations
  fileSearch: false
  fileCitations: false

# Registration settings
registration:
  socialLogins: ['github', 'google', 'discord']

# Agent Actions domain restrictions
actions:
  allowedDomains:
    - 'swapi.dev'
    - 'finspot.ai'
    - 'google.com'

# MCP Server domain restrictions
mcpSettings:
  allowedDomains:
    - 'fs-le-dev-prometheus.finspot.in'
    - 'host.docker.internal'
    - 'mcp-pg'
    - 'mcp-mysql'
    - 'mcp-neo4j'
    - 'mcp-es'
    - 'mcp-rmq'
    - 'mcp-obs'

# MCP Servers configuration
mcpServers:
  postgres:
    type: sse
    title: PostgreSQL Server
    url: http://mcp-pg:5000/mcp/sse
  mysql:
    type: sse
    title: MySQL Server
    url: http://mcp-mysql:5000/mcp/sse
  neo4j:
    type: sse
    title: Neo4j Server
    url: http://mcp-neo4j:5000/mcp/sse
  elasticsearch:
    type: sse
    title: Elasticsearch Server
    url: http://mcp-es:5000/mcp/sse
  rabbitmq:
    type: sse
    title: RabbitMQ Server
    url: http://mcp-rmq:5000/mcp/sse
  monitoring:
    type: sse
    title: Monitoring Server
    url: http://mcp-obs:8080/sse

# Definition of custom endpoints
endpoints:
  custom:
    # ============================================
    # Grok (xAI) Configuration
    # ============================================
    - name: 'Grok'
      apiKey: 'user_provided'
      baseURL: 'https://api.x.ai/v1'
      models:
        default:
          - 'grok-beta'
          - 'grok-vision-beta'
        fetch: true
      titleConvo: false
      titleModel: 'grok-beta'
      modelDisplayLabel: 'Grok'
      dropParams: ['stop', 'frequency_penalty', 'presence_penalty']
      iconURL: 'https://x.ai/favicon.ico'

    # ============================================
    # OpenRouter Configuration
    # ============================================
    - name: 'OpenRouter'
      apiKey: 'user_provided'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        x-FinSpot AI-body-parentmessageid: '{{FinSpot AI_BODY_PARENTMESSAGEID}}'
      models:
        default:
          # Free Models (No credits needed!)
          - 'google/gemini-2.0-flash-exp:free'
          - 'google/gemini-flash-1.5-exp:free'
          - 'meta-llama/llama-3.2-3b-instruct:free'
          - 'meta-llama/llama-3.1-8b-instruct:free'
          - 'microsoft/phi-3-mini-128k-instruct:free'
          - 'qwen/qwen-2-7b-instruct:free'
          # Anthropic Models (Paid)
          - 'anthropic/claude-opus-4'
          - 'anthropic/claude-sonnet-4'
          - 'anthropic/claude-3.5-sonnet'
          - 'anthropic/claude-3.5-haiku'
          # OpenAI Models (Paid)
          - 'openai/gpt-4o'
          - 'openai/gpt-4o-mini'
          - 'openai/o1'
          - 'openai/o1-mini'
          # Google Models (Paid)
          - 'google/gemini-pro-1.5'
          # Meta Llama Models (Paid)
          - 'meta-llama/llama-3.3-70b-instruct'
          - 'meta-llama/llama-3.1-405b-instruct'
          # Mistral Models (Paid)
          - 'mistralai/mistral-large'
          - 'mistralai/mixtral-8x7b-instruct'
          # xAI Grok via OpenRouter (Paid)
          - 'x-ai/grok-beta'
          # DeepSeek Models (Paid)
          - 'deepseek/deepseek-chat'
        fetch: true
      titleConvo: false
      titleModel: 'google/gemini-2.0-flash-exp:free'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'
      iconURL: 'https://openrouter.ai/favicon.ico'
      # Limit max tokens to prevent credit issues
      maxContextTokens: 8192
      max_tokens: 4096

    # ============================================
    # Groq Configuration (Fast Inference)
    # ============================================
    - name: 'Groq'
      apiKey: 'user_provided'
      baseURL: 'https://api.groq.com/openai/v1/'
      models:
        default:
          - 'llama-3.3-70b-versatile'
          - 'llama-3.1-70b-versatile'
          - 'mixtral-8x7b-32768'
          - 'gemma2-9b-it'
        fetch: false
      titleConvo: false
      titleModel: 'llama-3.3-70b-versatile'
      modelDisplayLabel: 'Groq'
      dropParams: ['stop', 'frequency_penalty', 'presence_penalty']

    # ============================================
    # Mistral AI Configuration
    # ============================================
    - name: 'Mistral'
      apiKey: 'user_provided'
      baseURL: 'https://api.mistral.ai/v1'
      models:
        default:
          - 'mistral-large-latest'
          - 'mistral-medium-latest'
          - 'mistral-small-latest'
        fetch: true
      titleConvo: false
      titleModel: 'mistral-small-latest'
      modelDisplayLabel: 'Mistral'
      dropParams: ['stop', 'user', 'frequency_penalty', 'presence_penalty']

    # ============================================
    # NVIDIA NIM Configuration
    # ============================================
    - name: 'NVIDIA'
      apiKey: 'user_provided'
      baseURL: 'https://integrate.api.nvidia.com/v1'
      models:
        default:
          # Meta Llama Models
          - 'meta/llama-3.1-405b-instruct'
          - 'meta/llama-3.1-70b-instruct'
          - 'meta/llama-3.1-8b-instruct'
          - 'meta/llama3-70b-instruct'
          # Microsoft Models
          - 'microsoft/phi-3-medium-128k-instruct'
          - 'microsoft/phi-3-mini-128k-instruct'
          - 'microsoft/phi-3-small-128k-instruct'
          # Mistral Models
          - 'mistralai/mistral-large-2-instruct'
          - 'mistralai/mixtral-8x7b-instruct-v0.1'
          - 'mistralai/mixtral-8x22b-instruct-v0.1'
          # Google Models
          - 'google/gemma-2-27b-it'
          - 'google/gemma-2-9b-it'
          - 'google/gemma-7b'
          # IBM Granite Models
          - 'ibm/granite-34b-code-instruct'
          - 'ibm/granite-8b-code-instruct'
          # Snowflake Arctic
          - 'snowflake/arctic'
          # NVIDIA Nemotron
          - 'nvidia/nemotron-4-340b-instruct'
          # Databricks DBRX
          - 'databricks/dbrx-instruct'
          # Upstage Solar
          - 'upstage/solar-10.7b-instruct'
        fetch: true
      titleConvo: false
      titleModel: 'meta/llama-3.1-70b-instruct'
      modelDisplayLabel: 'NVIDIA'
      dropParams: ['stop', 'frequency_penalty', 'presence_penalty']
      iconURL: 'https://www.nvidia.com/favicon.ico'

    # ============================================
    # Local LLM Server (Qwen3-8B)
    # ============================================
    - name: 'LocalLLM'
      apiKey: 'not-needed'
      baseURL: 'http://llm-server:8080/v1'
      models:
        default:
          - 'Qwen3-8B-Q4_K_M.gguf'
        fetch: true
      titleConvo: false
      titleModel: 'Qwen3-8B-Q4_K_M.gguf'
      modelDisplayLabel: 'Local LLM'
      dropParams:
        - 'useResponsesApi'
        - 'web_search'
        - 'reasoning_effort'
        - 'reasoning_summary'
        - 'verbosity'
        - 'frequency_penalty'
        - 'presence_penalty'
      maxContextTokens: 65536
      max_tokens: 4096
      iconURL: 'https://qianwen-res.oss-cn-beijing.aliyuncs.com/logo_qwen.jpg'
