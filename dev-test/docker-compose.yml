version: '3.8'

services:

  # 1. PostgreSQL MCP
  mcp-pg:
    build: ../mcp-toolbox-main
    container_name: dev-mcp-pg
    env_file: .env
    command: ["--prebuilt=postgres", "--address=0.0.0.0", "--port=5000"]
    ports: ["5001:5000"]

  # 2. MySQL MCP
  mcp-mysql:
    build: ../mcp-toolbox-main
    container_name: dev-mcp-mysql
    env_file: .env
    command: ["--prebuilt=mysql", "--address=0.0.0.0", "--port=5000"]
    ports: ["5002:5000"]

  # 3. Neo4j MCP
  mcp-neo4j:
    build: ../mcp-toolbox-main
    container_name: dev-mcp-neo4j
    env_file: .env
    command: ["--prebuilt=neo4j", "--address=0.0.0.0", "--port=5000"]
    ports: ["5003:5000"]

  # 4. Elasticsearch MCP
  mcp-es:
    build: ../mcp-toolbox-main
    container_name: dev-mcp-es
    env_file: .env
    volumes:
      - ./mcp-toolbox-es.yaml:/app/mcp-toolbox-es.yaml:ro
    command: ["--config=/app/mcp-toolbox-es.yaml", "--address=0.0.0.0", "--port=5000"]
    ports: ["5004:5000"]

  # 5. RabbitMQ MCP
  mcp-rmq:
    build: ../mcp-toolbox-main
    container_name: dev-mcp-rmq
    env_file: .env
    command: ["--prebuilt=rabbitmq", "--address=0.0.0.0", "--port=5000"]
    ports: ["5005:5000"]

  # 6. Observability (Prometheus + Loki)
  mcp-obs:
    build: ../promloki-mcp-go
    container_name: dev-mcp-obs
    env_file: .env
    ports: ["8080:8080"]

  # 7. AskArgus UI
  askargus:
    build: ../AskArgus
    container_name: dev-askargus
    env_file: .env
    ports: ["3080:3080"]
    volumes:
      - ./askargus.yaml:/app/askargus.yaml:ro
    depends_on:
      - mcp-pg
      - mcp-mysql
      - mcp-obs
      - mongodb

  # 8. MongoDB (Data Storage for AskArgus)
  mongodb:
    image: mongo:latest
    container_name: dev-mongodb
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
