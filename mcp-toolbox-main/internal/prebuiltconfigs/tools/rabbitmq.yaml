sources:
  rabbitmq-source:
    kind: http
    baseUrl: ${RABBITMQ_BASE_URL:http://localhost:15672}
    headers:
      Authorization: Basic ${RABBITMQ_BASIC_AUTH}
      Content-Type: application/json
    timeout: ${RABBITMQ_TIMEOUT:30s}
    returnFullError: ${RABBITMQ_RETURN_FULL_ERROR:false}

tools:
  list_queues:
    kind: http
    source: rabbitmq-source
    description: "List queues in the configured RabbitMQ virtual host."
    method: GET
    path: /api/queues/${RABBITMQ_VHOST_ENCODED:%2F}
  list_exchanges:
    kind: http
    source: rabbitmq-source
    description: "List exchanges in the configured RabbitMQ virtual host."
    method: GET
    path: /api/exchanges/${RABBITMQ_VHOST_ENCODED:%2F}
  get_queue:
    kind: http
    source: rabbitmq-source
    description: "Get details for one RabbitMQ queue by name."
    method: GET
    path: /api/queues/${RABBITMQ_VHOST_ENCODED:%2F}/{{.queue}}
    pathParams:
      - name: queue
        type: string
        description: "Queue name."
  publish_message:
    kind: http
    source: rabbitmq-source
    description: "Publish a message to an exchange."
    method: POST
    path: /api/exchanges/${RABBITMQ_VHOST_ENCODED:%2F}/{{.exchange}}/publish
    pathParams:
      - name: exchange
        type: string
        description: "Exchange name."
    requestBody: |
      {
        "properties": {},
        "routing_key": "{{.routing_key}}",
        "payload": "{{.payload}}",
        "payload_encoding": "string"
      }
    bodyParams:
      - name: routing_key
        type: string
        description: "Routing key for the publish operation."
      - name: payload
        type: string
        description: "Message body content."
  get_messages:
    kind: http
    source: rabbitmq-source
    description: "Pull messages from a queue using RabbitMQ Management API."
    method: POST
    path: /api/queues/${RABBITMQ_VHOST_ENCODED:%2F}/{{.queue}}/get
    pathParams:
      - name: queue
        type: string
        description: "Queue name."
    requestBody: |
      {
        "count": {{.count}},
        "ackmode": "{{.ackmode}}",
        "encoding": "auto",
        "truncate": 50000
      }
    bodyParams:
      - name: count
        type: integer
        description: "Maximum number of messages to fetch."
        default: 10
      - name: ackmode
        type: string
        description: "RabbitMQ ack mode, for example ack_requeue_true or ack_requeue_false."
        default: "ack_requeue_true"

toolsets:
  rabbitmq_management_tools:
    - list_queues
    - get_queue
    - list_exchanges
    - publish_message
    - get_messages
