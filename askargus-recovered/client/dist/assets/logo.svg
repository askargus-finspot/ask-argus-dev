<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  
  <!-- Letter F -->
  <path d="M 180 160 L 320 160 L 320 200 L 230 200 L 230 240 L 300 240 L 300 280 L 230 280 L 230 360 L 180 360 Z" fill="white"/>
  
  <!-- AI Circuit Pattern -->
  <g stroke="url(#grad2)" stroke-width="4" fill="none">
    <!-- Nodes -->
    <circle cx="340" cy="200" r="8" fill="white"/>
    <circle cx="380" cy="240" r="8" fill="white"/>
    <circle cx="340" cy="280" r="8" fill="white"/>
    <circle cx="380" cy="320" r="8" fill="white"/>
    
    <!-- Connections -->
    <line x1="340" y1="200" x2="380" y2="240"/>
    <line x1="380" y1="240" x2="340" y2="280"/>
    <line x1="340" y1="280" x2="380" y2="320"/>
    <line x1="340" y1="200" x2="340" y2="280"/>
  </g>
  
  <!-- Sparkle Effect -->
  <g fill="white" opacity="0.8">
    <circle cx="200" cy="180" r="4"/>
    <circle cx="350" cy="170" r="3"/>
    <circle cx="320" cy="340" r="4"/>
    <circle cx="190" cy="320" r="3"/>
  </g>
</svg>