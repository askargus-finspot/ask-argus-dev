kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "askargus.fullname" $ }}-configenv
data:
  {{- if (index .Values "askargus-rag-api" "enabled") }}
  RAG_API_URL: http://{{ include "rag.fullname" (index .Subcharts "askargus-rag-api") | lower }}.{{ .Release.Namespace | lower }}.svc.cluster.local:8000 
  {{- end }}
  {{- if and (not (dig "configEnv" "MEILI_HOST" "" .Values.askargus)) .Values.meilisearch.enabled }}
  MEILI_HOST: http://{{ include "meilisearch.fullname" .Subcharts.meilisearch }}.{{ .Release.Namespace | lower }}.svc.cluster.local:7700
  {{- end }}
  {{- if and (not (dig "configEnv" "MONGO_URI" "" .Values.askargus)) .Values.mongodb.enabled }}
  MONGO_URI: mongodb://{{ include "mongodb.service.nameOverride" .Subcharts.mongodb }}.{{ .Release.Namespace | lower }}.svc.cluster.local:27017/AskArgus
  {{- end }}
  {{- if and (not (dig "configEnv" "USE_REDIS" "" .Values.askargus)) .Values.redis.enabled }}
  USE_REDIS: "true"
  {{- end }}
  {{- if and (not (dig "configEnv" "REDIS_URI" "" .Values.askargus)) .Values.redis.enabled }}
  REDIS_URI: redis://{{ include "common.names.fullname" .Subcharts.redis }}-master.{{ .Release.Namespace | lower }}.svc.cluster.local:6379
  {{- end }}
  {{- if .Values.askargus.configEnv }}
  {{- toYaml .Values.askargus.configEnv | nindent 2 }}
  {{- end }}