services:
  api:
    image: askargus-local:latest
    container_name: AskArgus-AI
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://mongodb:27017/AskArgus
      - JWT_SECRET=askargus-jwt-secret-key-change-in-production-secure-random-string
      - SESSION_SECRET=askargus-session-secret-key-change-in-production
      - REFRESH_TOKEN_SECRET=askargus-jwt-secret-key-change-in-production-secure-random-string
      - REFRESH_SECRET=askargus-jwt-secret-key-change-in-production-secure-random-string
      - JWT_REFRESH_SECRET=askargus-jwt-secret-key-change-in-production-secure-random-string
      - CONFIG_BYPASS_VALIDATION=true
    volumes:
      - ./.env:/app/.env
      - ./askargus.yaml:/app/askargus.yaml
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./data-node:/data/db
    command: mongod --noauth
