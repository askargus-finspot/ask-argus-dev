services:
  api:
    image: askargus-local:latest
    build:
      context: .
      dockerfile: Dockerfile.minimal-local
    container_name: AskArgus-AI
    ports:
      - "3080:3080"
    depends_on:
      mongodb:
        condition: service_healthy
      mcp-obs:
        condition: service_started
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://${MONGO_USERNAME:?Set MONGO_USERNAME in .env}:${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}@mongodb:27017/AskArgus?authSource=admin
      - CONFIG_BYPASS_VALIDATION=${CONFIG_BYPASS_VALIDATION:-false}
      - NODE_AUTH_TOKEN=
    volumes:
      - ./.env:/app/.env
      - ./logs:/app/logs
      - ./askargus.yaml:/app/askargus.yaml

  mcp-mysql:
    image: dev-test-mcp-mysql:latest
    build:
      context: ../mcp-toolbox
    container_name: askargus-mcp-mysql
    restart: unless-stopped
    env_file:
      - .env
    command: ["--prebuilt=mysql", "--address=0.0.0.0", "--port=5000"]
    ports:
      - "5002:5000"

  mcp-obs:
    image: dev-test-mcp-obs:latest
    build:
      context: ../promloki-mcp-go
    container_name: askargus-mcp-obs
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "18080:8080"

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:?Set MONGO_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
    volumes:
      - ./data-node:/data/db
    command: ["mongod", "--auth", "--setParameter", "diagnosticDataCollectionEnabled=false"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand({ ping: 1 }).ok\" | grep 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
