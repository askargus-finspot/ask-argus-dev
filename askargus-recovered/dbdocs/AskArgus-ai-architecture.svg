<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1120" viewBox="0 0 1700 1120">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263b53"/>
    </marker>
    <style>
      .bg { fill: #f5f8fc; }
      .panel { fill: #ffffff; stroke: #c7d2df; stroke-width: 2; }
      .panelTitle { font: 700 20px Segoe UI, Arial, sans-serif; fill: #102033; }
      .title { font: 700 32px Segoe UI, Arial, sans-serif; fill: #102033; }
      .subtitle { font: 400 16px Segoe UI, Arial, sans-serif; fill: #53677f; }
      .label { font: 700 15px Segoe UI, Arial, sans-serif; fill: #102033; }
      .text { font: 400 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Segoe UI, Arial, sans-serif; fill: #64748b; }
      .note { font: 700 13px Segoe UI, Arial, sans-serif; fill: #995d00; }
      .node { fill: #ffffff; stroke: #5d7896; stroke-width: 2; }
      .ui { fill: #edf7ff; stroke: #2771ad; stroke-width: 2; }
      .runtime { fill: #fff7e8; stroke: #c47d18; stroke-width: 3; }
      .store { fill: #eefaf2; stroke: #2d7d46; stroke-width: 2; }
      .mcp { fill: #eff8ff; stroke: #1f6a8a; stroke-width: 2; }
      .provider { fill: #f7f3ff; stroke: #6750a4; stroke-width: 2; }
      .flow { fill: none; stroke: #263b53; stroke-width: 2.2; marker-end: url(#arrow); }
      .flowSoft { fill: none; stroke: #64748b; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="1120"/>
  <text class="title" x="50" y="58">AskArgus Complete Flow Diagram</text>
  <text class="subtitle" x="50" y="86">Chat UI to LangGraph runtime, LLM providers, MCP tool calls, ELK, Prometheus, PostgreSQL, token usage, and response latency.</text>

  <rect class="panel" x="250" y="125" width="950" height="850" rx="14"/>
  <text class="panelTitle" x="275" y="160">AskArgus Application Stack</text>

  <rect class="ui" x="290" y="205" width="250" height="105" rx="10"/>
  <text class="label" x="315" y="238">AskArgus Chat UI</text>
  <text class="text" x="315" y="263">container: AskArgus-ai-ui</text>
  <text class="text" x="315" y="284">port: 3081</text>

  <rect class="node" x="615" y="205" width="285" height="105" rx="10"/>
  <text class="label" x="640" y="238">Backend Agent API</text>
  <text class="text" x="640" y="263">receives chat requests</text>
  <text class="text" x="640" y="284">/api/agents/chat/:endpoint</text>

  <rect class="store" x="615" y="335" width="285" height="105" rx="10"/>
  <text class="label" x="640" y="368">PostgreSQL DB</text>
  <text class="text" x="640" y="393">users, chats, messages</text>
  <text class="text" x="640" y="414">API keys, run metadata</text>

  <rect class="node" x="930" y="205" width="225" height="105" rx="10"/>
  <text class="label" x="955" y="238">Config and Policy</text>
  <text class="text" x="955" y="263">AskArgus-ai.yaml</text>
  <text class="text" x="955" y="284">endpoints, tools, domains</text>

  <rect class="runtime" x="290" y="485" width="610" height="345" rx="12"/>
  <text class="panelTitle" x="315" y="520">LangGraph Agent Runtime</text>
  <text class="note" x="315" y="545">USED HERE: planning, model calls, MCP tool steps, and streaming state</text>

  <rect class="node" x="330" y="585" width="230" height="75" rx="10"/>
  <text class="label" x="355" y="613">Agent Run Builder</text>
  <text class="text" x="355" y="637">creates request context</text>

  <rect class="node" x="630" y="585" width="230" height="75" rx="10"/>
  <text class="label" x="655" y="613">Runtime Nodes</text>
  <text class="text" x="655" y="637">planning and run steps</text>

  <rect class="node" x="330" y="710" width="230" height="80" rx="10"/>
  <text class="label" x="355" y="739">Decision Loop</text>
  <text class="text" x="355" y="763">model -> tool -> model</text>

  <rect class="node" x="630" y="710" width="230" height="80" rx="10"/>
  <text class="label" x="655" y="739">Usage and Streaming</text>
  <text class="text" x="655" y="763">tokens, tool count, latency</text>

  <rect class="mcp" x="945" y="535" width="220" height="135" rx="10"/>
  <text class="label" x="970" y="570">MCP Client</text>
  <text class="text" x="970" y="595">loads available tools</text>
  <text class="text" x="970" y="616">routes calls and results</text>
  <text class="text" x="970" y="637">returns tool output</text>

  <rect class="ui" x="55" y="520" width="160" height="85" rx="10"/>
  <text class="label" x="80" y="553">User</text>
  <text class="text" x="80" y="576">Browser</text>

  <rect class="panel" x="1260" y="125" width="380" height="245" rx="14"/>
  <text class="panelTitle" x="1285" y="160">LLM Providers</text>

  <rect class="provider" x="1295" y="205" width="295" height="70" rx="10"/>
  <text class="label" x="1320" y="235">NVIDIA Endpoint</text>
  <text class="small" x="1320" y="257">Kimi, Qwen, DeepSeek, Llama</text>

  <rect class="provider" x="1295" y="295" width="295" height="60" rx="10"/>
  <text class="label" x="1320" y="323">Other Endpoints</text>
  <text class="small" x="1320" y="343">OpenRouter, Groq, Mistral, Local LLM</text>

  <rect class="panel" x="1260" y="420" width="380" height="285" rx="14"/>
  <text class="panelTitle" x="1285" y="455">MCP Tool Servers</text>

  <rect class="mcp" x="1295" y="505" width="295" height="75" rx="10"/>
  <text class="label" x="1320" y="533">Prometheus MCP Server</text>
  <text class="small" x="1320" y="554">health_check, execute_query, list_metrics</text>
  <text class="small" x="1320" y="570">get_targets and metadata tools</text>

  <rect class="mcp" x="1295" y="605" width="295" height="75" rx="10"/>
  <text class="label" x="1320" y="633">Elasticsearch MCP Server</text>
  <text class="small" x="1320" y="654">list_indices, mappings, search, ESQL</text>
  <text class="small" x="1320" y="670">shards and log discovery tools</text>

  <rect class="panel" x="1260" y="755" width="380" height="220" rx="14"/>
  <text class="panelTitle" x="1285" y="790">Observability Data Sources</text>

  <rect class="store" x="1295" y="835" width="295" height="60" rx="10"/>
  <text class="label" x="1320" y="863">Prometheus TSDB</text>
  <text class="small" x="1320" y="883">metrics, series, samples, targets</text>

  <rect class="store" x="1295" y="910" width="295" height="55" rx="10"/>
  <text class="label" x="1320" y="940">Elasticsearch / ELK</text>
  <text class="small" x="1320" y="958">journal-log index, mappings, searches</text>

  <path class="flow" d="M215 562 C245 562, 260 258, 290 258"/>
  <text class="small" x="82" y="645">1. chat message</text>

  <path class="flow" d="M540 258 L615 258"/>
  <text class="small" x="552" y="245">2. HTTP request</text>

  <path class="flow" d="M757 310 L757 335"/>
  <text class="small" x="770" y="327">3. load user state</text>

  <path class="flow" d="M900 258 L930 258"/>
  <text class="small" x="910" y="245">4. config</text>

  <path class="flow" d="M695 310 C610 385, 450 500, 445 585"/>
  <text class="small" x="495" y="445">5. start agent run</text>

  <path class="flow" d="M560 622 L630 622"/>
  <path class="flow" d="M745 660 C745 695, 445 675, 445 710"/>
  <path class="flow" d="M560 750 L630 750"/>
  <text class="small" x="475" y="692">6. plan and decide</text>

  <path class="flow" d="M860 750 C915 735, 915 610, 945 605"/>
  <text class="small" x="905" y="725">7. tool call</text>

  <path class="flow" d="M1042 310 L1042 535"/>
  <text class="small" x="1055" y="412">tool registry</text>

  <path class="flow" d="M560 745 C840 430, 1185 238, 1295 240"/>
  <text class="small" x="930" y="355">8. LLM request</text>

  <path class="flowSoft" d="M560 758 C855 470, 1190 325, 1295 325"/>
  <text class="small" x="1035" y="453">optional provider</text>

  <path class="flow" d="M1165 575 C1205 545, 1240 542, 1295 542"/>
  <path class="flow" d="M1165 635 C1210 638, 1240 642, 1295 642"/>
  <text class="small" x="1192" y="528">9. MCP calls</text>

  <path class="flow" d="M1442 580 L1442 835"/>
  <path class="flow" d="M1442 680 L1442 910"/>
  <text class="small" x="1455" y="742">10. query data</text>

  <path class="flow" d="M1295 542 C1210 542, 1205 590, 1165 602"/>
  <path class="flow" d="M1295 642 C1210 642, 1205 620, 1165 602"/>
  <text class="small" x="1182" y="692">11. tool results</text>

  <path class="flow" d="M945 602 C875 630, 875 720, 860 746"/>
  <path class="flow" d="M745 790 C745 860, 415 895, 415 310"/>
  <text class="small" x="475" y="890">12. SSE chunks, tool steps, final answer</text>

  <path class="flow" d="M745 790 C760 835, 760 450, 757 440"/>
  <text class="small" x="770" y="835">13. store message usage</text>

  <text class="subtitle" x="50" y="1035">Summary: LangGraph is used inside the AskArgus backend agent runtime. MCP servers expose tools. Prometheus TSDB and ELK provide observability data. PostgreSQL stores app state and usage metadata.</text>
</svg>
